name: Build and Publish python-3-12-red-quartz

on:
  push:
    branches:
      - main
    paths:
      - python/3.12/red-quartz/Dockerfile
      - .github/workflows/python-3-12-red-quartz-image.yml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/python
          tags: |
            type=raw,value=latest
            type=raw,value=3.12-redquartz
            type=raw,value=3.12
            type=raw,value=3-redquartz
            type=raw,value=3
            type=raw,value=3.12-rocky
            type=raw,value=3-rocky
            type=raw,value=3.12-rhel
            type=raw,value=3-rhel
            type=raw,value=redquartz
            type=raw,value=rocky
            type=raw,value=rhel

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: python/3.12/red-quartz/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
