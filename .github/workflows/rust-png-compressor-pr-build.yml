name: Validate png-compressor Dockerfile

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - rust-png-compressor/Dockerfile
      - .github/workflows/rust-png-compressor-pr-build.yml

jobs:
  build-only:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rust-png-compressor/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: png-compressor:pr-${{ github.sha }}
