name: Validate nodejs-pnpm-22-10 Dockerfile

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - nodejs-pnpm/22-10/Dockerfile
      - .github/workflows/nodejs-pnpm-22-10-pr-build.yml

jobs:
  build-only:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nodejs-pnpm/22-10/Dockerfile
          push: false
          tags: nodejs-pnpm-22-10:pr-${{ github.sha }}
